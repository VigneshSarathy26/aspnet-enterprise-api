version: '3.9'

services:
  # ── Cloud Billing API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DatabaseProvider: "SqlServer"
      ConnectionStrings__SqlServer: "Server=mssql;Database=billing_telemetry;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;"
      # ConnectionStrings__Oracle: "Data Source=oracle:1521/FREEPDB1;User Id=SYSTEM;Password=YourStrong@Password;"
      # ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=billing_telemetry;Username=billing_user;Password=billing_pass"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      OpenTelemetry__Endpoint: "http://jaeger:4317"
    depends_on:
      mssql:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [billing-net]

  # ── MS-SQL Server ──────────────────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: billing-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Password"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Password' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [billing-net]

  # ── Oracle DB (Optional) ───────────────────────────────────────────────────
  # oracle:
  #   image: gvenzl/oracle-free:slim
  #   container_name: billing-oracle
  #   environment:
  #     ORACLE_PASSWORD: "YourStrong@Password"
  #   ports:
  #     - "1521:1521"
  #   volumes:
  #     - oracle_data:/opt/oracle/oradata
  #   healthcheck:
  #     test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus system/YourStrong@Password@localhost:1521/FREEPDB1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks: [billing-net]

  # ── PostgreSQL (Optional) ──────────────────────────────────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: billing-postgres
  #   environment:
  #     POSTGRES_DB: billing_telemetry
  #     POSTGRES_USER: billing_user
  #     POSTGRES_PASSWORD: billing_pass
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_telemetry"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks: [billing-net]

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: billing-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [billing-net]

  # ── Jaeger (Distributed Tracing) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: billing-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks: [billing-net]

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: billing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [billing-net]

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: billing-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [billing-net]

volumes:
  mssql_data:
  # oracle_data:
  # postgres_data:
  redis_data:
  grafana_data:

networks:
  billing-net:
    driver: bridge
